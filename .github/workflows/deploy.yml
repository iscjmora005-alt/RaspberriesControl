name: Despliegue Automático


on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Obtener el código del repositorio
        uses: actions/checkout@v3

      - name: Configurar entorno Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias del proyecto
        run: npm install

      - name: Ejecutar script de distribución
        # Aquí es donde se conecta con la tarea anterior de Firebase
        run: echo "Simulando despliegue automático del APK para Raspberries Control..."
        # run: npm run distribute:android